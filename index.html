<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Oficial 5y6</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        h2 { text-align: center; color: #ffc200; margin-top: 0; font-size: 20px; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-weight: bold; font-size: 14px; }
        .input-group input { width: 80px; padding: 6px; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; text-align: center; }
        .panel-juego { background: #1a1a1a; padding: 12px; border-radius: 6px; border: 1px solid #333; margin-top: 15px; }
        .fila-carrera { display: flex; align-items: center; margin-bottom: 10px; gap: 6px; background: #222; padding: 6px; border-radius: 4px; }
        .carrera-titulo { width: 80px; font-weight: bold; font-size: 13px; color: #aaa; }
        .grupo-botones { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
        .grupo-botones button { width: 32px; height: 32px; font-weight: bold; border: 1px solid #555; background: #333; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .grupo-botones button.selected { background: #10b981; border-color: #10b981; }
        .acciones { display: flex; gap: 10px; margin-top: 15px; }
        .btn-main { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-limpiar { background: #ef4444; color: white; }
        .btn-sellar { background: #ffc200; color: #000; }
        .modal-simulado { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2d2d2d; border: 2px solid #555; padding: 20px; border-radius: 8px; z-index: 99999; box-shadow: 0 4px 20px rgba(0,0,0,0.8); text-align: center; min-width: 280px; box-sizing: border-box; }
        .modal-simulado p { margin-bottom: 15px; font-size: 14px; }
        .modal-simulado button { padding: 8px 16px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background: #2563eb; color: white; margin: 5px; min-width: 85px; }
        .btn-cancelar, .btn-print { background: #4b5563 !important; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:99998; }
        .seccion-reporte-inh { max-width: 600px; margin: 20px auto 0 auto; background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #444; overflow-x: auto; }
        .seccion-reporte-inh h3 { margin: 0 0 10px 0; font-size: 14px; color: #ffc200; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 10px; color: #e4e4e7; }
        th { background: #111; padding: 8px; color: #a1a1aa; font-weight: bold; border-bottom: 2px solid #333; }
        td { padding: 8px; border-bottom: 1px solid #333; white-space: pre-line; }
        tr:nth-child(even) { background: #1e1e22; }
        .status-perdedor { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Sistema 5y6</h2>
    
    <div class="input-group">
        <label>Unidades / Monto:</label>
        <input type="number" id="unidades-input" value="1" min="1">
    </div>

    <div class="panel-juego" id="zona-interactiva">
        <div class="acciones" style="margin-bottom: 12px;">
            <button class="btn-main btn-limpiar" id="limpiar-btn">Limpiar Formulario</button>
        </div>

        <div id="contenedor-filas"></div>

        <div class="acciones">
            <button class="btn-main btn-sellar" id="sellar-btn">Sellar Cuadro</button>
        </div>
    </div>
</div>
<div class="seccion-reporte-inh">
    <h3>Historial de Apuestas (Ãšltimos 50 tickets)</h3>
    <table>
        <thead>
            <tr>
                <th>FECHA</th>
                <th>TICKET</th>
                <th>HIPÃ“DROMO</th>
                <th>TIPO</th>
                <th>SELECCIONES</th>
                <th>MONTO</th>
                <th>ESTADO</th>
            </tr>
        </thead>
        <tbody id="tabla-body">
            <!-- Las filas se insertarÃ¡n de forma dinÃ¡mica aquÃ­ abajo -->
        </tbody>
    </table>
</div>

<div class="overlay" id="modal-overlay"></div>

<div class="modal-simulado" id="modal-confirmar">
    <p style="font-weight: bold; color: #ffc200; margin-top:0;">ConfirmaciÃ³n de Jugada</p>
    <div id="resumen-combinaciones" style="font-size: 12px; font-family: monospace; background: #1a1a1a; padding: 8px; border-radius: 4px; text-align: left; max-height: 90px; overflow-y: auto; margin-bottom: 15px; color:#34d399;"></div>
    <button class="btn-cancelar" id="cancelar-btn">Cancelar</button>
    <button id="confirmar-btn">Confirmar</button>
</div>

<div class="modal-simulado" id="modal-ticket-exitoso">
    <p style="color: #10b981; font-weight: bold; margin-top:0;">âœ” OperaciÃ³n Exitosa</p>
    <p id="ticket-info-text" style="font-size: 12px; font-family: monospace; background:#1a1a1a; padding:6px; border-radius:4px;"></p>
    <button class="btn-print" id="imprimir-btn">Imprimir</button>
    <button id="aceptar-btn">Aceptar</button>
</div>

<script>
    const contenedor = document.getElementById('contenedor-filas');
    const tablaBody = document.getElementById('tabla-body');
    let ticketTemporal = null;

    for (let i = 1; i <= 6; i++) {
        let fila = document.createElement('div');
        fila.className = 'fila-carrera';
        let titulo = document.createElement('div');
        titulo.className = 'carrera-titulo';
        titulo.innerText = `Carrera ${i}:`;
        let group = document.createElement('div');
        group.className = 'grupo-botones';
        
        for (let j = 1; j <= 10; j++) {
            let btn = document.createElement('button');
            btn.type = 'button';
            btn.innerText = j;
            btn.onclick = () => btn.classList.toggle('selected');
            group.appendChild(btn);
        }
        fila.append(titulo, group);
        contenedor.appendChild(fila);
    }

    const limpiarBtn = document.getElementById('limpiar-btn');
    const sellarBtn = document.getElementById('sellar-btn');
    const overlay = document.getElementById('modal-overlay');
    const modalConfirmar = document.getElementById('modal-confirmar');
    const modalTicket = document.getElementById('modal-ticket-exitoso');
    const confirmarBtn = document.getElementById('confirmar-btn');
    const cancelarBtn = document.getElementById('cancelar-btn');
    const aceptarBtn = document.getElementById('aceptar-btn');
    const imprimirBtn = document.getElementById('imprimir-btn');
    const ticketInfoText = document.getElementById('ticket-info-text');
    const resumenCombinaciones = document.getElementById('resumen-combinaciones');

    limpiarBtn.onclick = () => {
        document.querySelectorAll('.grupo-botones button').forEach(b => b.classList.remove('selected'));
    };

    sellarBtn.onclick = () => {
        let carrerasValidas = 0;
        let jugadaActual = [];
        
        for (let i = 0; i < 6; i++) {
            let seleccionados = Array.from(contenedor.children[i].querySelectorAll('.grupo-botones button.selected')).map(b => b.innerText);
            if (seleccionados.length > 0) { 
                carrerasValidas++; 
                jugadaActual.push(`C${i+8}(${seleccionados.join(',')})`);
            }
        }

        if (carrerasValidas < 6) {
            console.log("Simulador: Formulario incompleto o vacÃ­o.");
            return; 
        }

        resumenCombinaciones.innerText = jugadaActual.join('\n');
        overlay.style.display = 'block';
        modalConfirmar.style.display = 'block';
    };

    cancelarBtn.onclick = () => {
        modalConfirmar.style.display = 'none';
        overlay.style.display = 'none';
    };

    confirmarBtn.onclick = () => {
        modalConfirmar.style.display = 'none';

        if (Math.random() < 0.03) { 
            console.log("Simulador: Error de red forzado.");
            return; 
        }

        let jugadaActual = [];
        for (let i = 1; i <= 6; i++) {
            let seleccionados = Array.from(contenedor.children[i-1].querySelectorAll('.grupo-botones button.selected')).map(b => b.innerText);
            jugadaActual.push(`C${i+8}(${seleccionados.join(',')})`);
        }

        let numTicket = "#" + Math.floor(1000000 + Math.random() * 9000000);
        ticketInfoText.innerText = `Ticket: ${numTicket}\n${jugadaActual.join(' ').substring(0,30)}...`;
        
        modalTicket.style.display = 'block';

        ticketTemporal = {
            fecha: new Date().toLocaleDateString() + "\n" + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).toLowerCase(),
            ticket: numTicket,
            hipodromo: "La Rinconada",
            tipo: "5 Y 6",
            selecciones: jugadaActual.join(' '),
            monto: (parseFloat(document.getElementById('unidades-input').value) * 150).toFixed(2),
            estado: "PERDEDOR"
        };

        if (window.interceptorActivado && window.redTicketsInh) {
            window.redTicketsInh.push(ticketTemporal);
            setTimeout(() => {
                window.ticketDetectado = true;
                window.dispatchEvent(new CustomEvent('ticketSimuladoExitoso'));
            }, 300);
        }
    };

    imprimirBtn.onclick = () => {};

    aceptarBtn.onclick = () => {
        modalTicket.style.display = 'none';
        overlay.style.display = 'none';

        if (ticketTemporal) {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${ticketTemporal.fecha}</td>
                <td style="font-weight:bold;">${ticketTemporal.ticket}</td>
                <td>${ticketTemporal.hipodromo}</td>
                <td>${ticketTemporal.tipo}</td>
                <td style="color:#a7f3d0;">${ticketTemporal.selecciones}</td>
                <td>${ticketTemporal.monto}</td>
                <td class="status-perdedor">${ticketTemporal.estado}</td>
            `;
            tablaBody.insertBefore(row, tablaBody.firstChild);
            
            if (tablaBody.children.length > 50) {
                tablaBody.removeChild(tablaBody.lastChild);
            }
            ticketTemporal = null;
        }

        document.querySelectorAll('.grupo-botones button').forEach(b => b.classList.remove('selected'));
    };
</script>
</body>
</html>
