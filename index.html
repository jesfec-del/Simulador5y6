<div class="modal-simulado" id="modal-confirmar">
    <p style="font-weight: bold; color: #ffc200; margin-top:0; margin-bottom:5px;">Confirmación de Jugada</p>
    <div id="resumen-combinaciones" class="bloque-vertical-visual"></div>
    <div style="margin-top: 15px;">
        <button class="btn-cancelar" id="cancelar-btn">Cancelar</button>
        <button id="confirmar-btn">Confirmar</button>
    </div>

<div class="modal-simulado" id="modal-conectando">
    <p id="loading-title" style="font-weight: bold; color: #ffc200; margin-top:0;">Procesando Apuesta...</p>
    <div class="spinner"></div>
    <p id="loading-subtext" style="font-size: 11px; color: #aaa;">Estableciendo conexión con los servidores del INH</p>
</div>

</div>

    <p style="color: #10b981; font-weight: bold; margin-top:0;">✔ Operación Exitosa</p>
    <p id="ticket-info-text" style="font-size: 12px; font-family: monospace; background:#1a1a1a; padding:6px; border-radius:4px; text-align:left; white-space:pre-wrap;"></p>

    <button id="aceptar-btn">Aceptar</button>
</div>

<script>
    let estructuraCarreras = [];
    let ticketTemporal = null;
    let loopTextosLoading = null;
    window.redTicketsInh = window.redTicketsInh || [];
    let intentosGlobales = 0;
    let datosSeleccionadosRaw = [];

    const contenedor = document.getElementById('contenedor-filas');
    const sellarBtn = document.getElementById('sellar-btn');
    const overlay = document.getElementById('modal-overlay');
    const modalConfirmar = document.getElementById('modal-confirmar');
    const modalConectando = document.getElementById('modal-conectando');
    const modalErrorInh = document.getElementById('modal-error-inh');
    const modalTicketExitoso = document.getElementById('modal-ticket-exitoso');
    const resumenComb = document.getElementById('resumen-combinaciones');
    const confirmarBtn = document.getElementById('confirmar-btn');
    const cancelarBtn = document.getElementById('cancelar-btn');
    const ticketInfoText = document.getElementById('ticket-info-text');
    const tablaBody = document.getElementById('tabla-body');
    const loadingTitle = document.getElementById('loading-title');
    const loadingSubtext = document.getElementById('loading-subtext');
    const unidadesInput = document.getElementById('unidades-input');

        let inicio5y6 = totalCarrerasHoy - 5; 

        for (let numCarrera = 1; numCarrera <= 21; numCarrera++) {
            if (numCarrera <= totalCarrerasHoy) {
                let inscritosAleatorios = Math.floor(10 + Math.random() * 6);
                let retiradosAleatorios = [];
                let limiteRetirados = Math.floor(1 + Math.random() * 2);
                while (retiradosAleatorios.length < limiteRetirados) {
                    let nAzar = Math.floor(1 + Math.random() * inscritosAleatorios);
                    if (!retiradosAleatorios.includes(nAzar)) retiradosAleatorios.push(nAzar);

        }

    <p style="color: #10b981; font-weight: bold; margin-top:0;">✔ Operación Exitosa</p>
    <p id="ticket-info-text" style="font-size: 12px; font-family: monospace; background:#1a1a1a; padding:6px; border-radius:4px; text-align:left; white-space:pre-wrap;"></p>
    <button class="btn-print" id="imprimir-btn">Descargar</button>
    <button id="aceptar-btn">Aceptar</button>
</div>

<script>
    let estructuraCarreras = [];
    let ticketTemporal = null;
    let loopTextosLoading = null;
    window.redTicketsInh = window.redTicketsInh || [];
    let intentosGlobales = 0;
    let datosSeleccionadosRaw = [];

    const contenedor = document.getElementById('contenedor-filas');
    const sellarBtn = document.getElementById('sellar-btn');
    const overlay = document.getElementById('modal-overlay');
    const modalConfirmar = document.getElementById('modal-confirmar');
    const modalConectando = document.getElementById('modal-conectando');
    const modalErrorInh = document.getElementById('modal-error-inh');
    const modalTicketExitoso = document.getElementById('modal-ticket-exitoso');
    const resumenComb = document.getElementById('resumen-combinaciones');
    const confirmarBtn = document.getElementById('confirmar-btn');
    const cancelarBtn = document.getElementById('cancelar-btn');
    const ticketInfoText = document.getElementById('ticket-info-text');
    const tablaBody = document.getElementById('tabla-body');
    const loadingTitle = document.getElementById('loading-title');
    const loadingSubtext = document.getElementById('loading-subtext');
    const unidadesInput = document.getElementById('unidades-input');

    function inicializarJornadaHipica() {
        estructuraCarreras = [];
        let totalCarrerasHoy = Math.floor(7 + Math.random() * 15); 
        let inicio5y6 = totalCarrerasHoy - 5; 

        for (let numCarrera = 1; numCarrera <= 21; numCarrera++) {
            if (numCarrera <= totalCarrerasHoy) {
                let inscritosAleatorios = Math.floor(10 + Math.random() * 6);
                let retiradosAleatorios = [];
                let limiteRetirados = Math.floor(1 + Math.random() * 2);
                while (retiradosAleatorios.length < limiteRetirados) {
                    let nAzar = Math.floor(1 + Math.random() * inscritosAleatorios);
                    if (!retiradosAleatorios.includes(nAzar)) retiradosAleatorios.push(nAzar);
                }
                let esVisibleVisual = (numCarrera >= inicio5y6);
                estructuraCarreras.push({
                    carrera: numCarrera,
                    inscritos: inscritosAleatorios,
                    retirados: retiradosAleatorios.sort((a,b) => a - b),
                    visible: esVisibleVisual,
                    esValida: esVisibleVisual
                });
            } else {
                estructuraCarreras.push({ carrera: numCarrera, inscritos: 0, retirados: [], visible: false, esValida: false });
            }
        }
        renderizarTablero();
    }
    // 2. TU MOTOR MAESTRO ORIGINAL DE RENDERIZACIÓN DE BOTONES Y MANTAS DE COLORES
    function renderizarTablero() {
        contenedor.innerHTML = "";
        // Inicializa la matriz lógica con exactamente 6 posiciones para las carreras visibles
        datosSeleccionadosRaw = Array.from({ length: 6 }, () => []);
        let contadorValidasInsertadas = 0;

        let colH = { 
            1: {b:"#ffeb3b", c:"#000"}, 2: {b:"#ffffff", c:"#000"}, 3: {b:"#2196f3", c:"#fff"}, 4: {b:"#f44336", c:"#fff"}, 5: {b:"#4caf50", c:"#fff"}, 
            6: {b:"#9e9e9e", c:"#fff"}, 7: {b:"#f57c00", c:"#fff"}, 8: {b:"#e91e63", c:"#fff"}, 9: {b:"#009688", c:"#fff"}, 10: {b:"#9c27b0", c:"#fff"}, 
            11: {b:"#795548", c:"#fff"}, 12: {b:"#ffc107", c:"#000"}, 13: {b:"#3f51b5", c:"#fff"}, 14: {b:"#000000", c:"#fff"}, 15: {b:"#8b5cf6", c:"#fff"}
        };

        estructuraCarreras.forEach((cCfg) => {
            if (!cCfg.visible && cCfg.inscritos === 0) return;

            let fila = document.createElement('div');
            fila.className = 'carrera-row';
            
            if (!cCfg.visible) {
                fila.style.display = 'none'; 
                fila.style.visibility = 'hidden';
            }

            let idxFilaActual = contadorValidasInsertadas;
            if (cCfg.esValida) contadorValidasInsertadas++;

            let tit = document.createElement('div');
            tit.className = 'titulo-valida';
            tit.innerText = `C${cCfg.carrera} Pos. ${cCfg.esValida ? idxFilaActual + 1 : 'X'}`;
            fila.appendChild(tit);

            let grid = document.createElement('div');
            grid.className = 'grid-caballos';

            for (let c = 1; c <= cCfg.inscritos; c++) {
                let celda = document.createElement('div'); celda.className = 'celda-caballo';
                let chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'check-nativo';
                let btn = document.createElement('button'); btn.className = 'btn-tactil'; btn.innerText = c;
                let cfgColor = colH[c] || {b:"#333", c:"#fff"}; btn.style.background = cfgColor.b; btn.style.color = cfgColor.c;

                if (cCfg.retirados.includes(c)) {
                    chk.disabled = true; btn.disabled = true; btn.classList.add('retirado');
                    btn.style.background = '#222'; btn.style.color = '#555'; btn.style.textDecoration = 'line-through'; btn.style.opacity = '0.2';
                } else {
                    chk.addEventListener('change', function() {
                        if (chk.checked) {
                            if (cCfg.esValida && !datosSeleccionadosRaw[idxFilaActual].includes(c.toString())) { datosSeleccionadosRaw[idxFilaActual].push(c.toString()); }
                            btn.style.boxShadow = "0 0 0 4px #10b981 inset"; btn.classList.add('selected');
                        } else {
                            if (cCfg.esValida) datosSeleccionadosRaw[idxFilaActual] = datosSeleccionadosRaw[idxFilaActual].filter(n => n !== c.toString());
                            btn.style.boxShadow = "none"; btn.classList.remove('selected');
                        }
                        calcularMontoSimulado();
                    });
                    btn.onclick = () => { chk.checked = !chk.checked; chk.dispatchEvent(new Event('change')); };
                }
                celda.append(chk, btn); grid.appendChild(celda);
            }
            fila.appendChild(grid); contenedor.appendChild(fila);
        });
        calcularMontoSimulado();
    }

    function calcularMontoSimulado() {
        let comb = datosSeleccionadosRaw.reduce((a, b) => a * b.length, 1);
        let validasConSeleccion = datosSeleccionadosRaw.filter(arr => arr.length > 0).length;
        let factorUnidades = parseInt(unidadesInput.value || "1", 10);
        let montoTotal = validasConSeleccion === 6 ? (comb * factorUnidades * 25) : 0;
        document.querySelector('.txt-monto').innerText = "Monto: " + montoTotal.toLocaleString('es-VE', {minimumFractionDigits: 2}) + " Bs";
        sellarBtn.disabled = (validasConSeleccion !== 6);
    }

    unidadesInput.addEventListener('input', calcularMontoSimulado);

    function aplicarRasgosRealesTuBoton() {
        let listaEmojis = ['🏆', '🐎', '💰', '🎫', '✅', '🎰'];
        let emojiElegido = listaEmojis[Math.floor(Math.random() * listaEmojis.length)];
        sellarBtn.className = 'btn-main btn-sellar group/button';
        sellarBtn.setAttribute('style', 'display: flex !important; align-items: center !important; gap: 6px !important; justify-content: center;');
        sellarBtn.innerHTML = `<span>${emojiElegido}</span> <span>Sellar Cuadro</span>`;
    }

    sellarBtn.onclick = () => {
        overlay.style.display = 'block'; modalConfirmar.style.display = 'block'; resumenComb.innerHTML = "";
        let vIdx = 0;
        estructuraCarreras.forEach((cCfg) => {
            if (cCfg.esValida) {
                let sorted = [...datosSeleccionadosRaw[vIdx++]].sort((a,b)=>parseInt(a)-parseInt(b));
                resumenComb.innerHTML += `C${cCfg.carrera} -> (${sorted.join('-')})<br>`;
            }
        });
    };

    cancelarBtn.onclick = () => { overlay.style.display = 'none'; modalConfirmar.style.display = 'none'; };
    confirmarBtn.onclick = () => { modalConfirmar.style.display = 'none'; modalConectando.style.display = 'block'; intentosGlobales = 0; ejecutarFlujoServidor(); };

    function ejecutarFlujoServidor() {
        intentosGlobales++;
        if (intentosGlobales === 1) {
            loadingTitle.innerText = "Procesando Apuesta..."; loadingSubtext.innerText = "Estableciendo conexión con los servidores del INH";
            setTimeout(ejecutarFlujoServidor, 1200);
        } else if (intentosGlobales === 2) {
            loadingTitle.innerText = "Sellanado Cuadro..."; loadingSubtext.innerText = "Transmitiendo bloque cifrado de combinaciones masivas";
            setTimeout(ejecutarFlujoServidor, 1500);
        } else {
            modalConectando.style.display = 'none'; modalTicketExitoso.style.display = 'block';
            let numTk = Math.floor(1000000 + Math.random() * 9000000);
            let f = new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let tTxt = `La Rinconada · 5 y 6\nTicket: #${numTk}\nFecha: ${f}\n`;
            let idxValida = 0;
            estructuraCarreras.forEach((c) => { if (c.esValida) { tTxt += `C${c.carrera}: ${datosSeleccionadosRaw[idxValida++].join('-')}\n`; } });
            ticketInfoText.innerText = tTxt;
            window.redTicketsInh.push({ ticket: numTk, fecha: f, hipodromo: "La Rinconada", tipo: "5y6", selecciones: datosSeleccionadosRaw.map(a=>a.join('-')).join(' | '), monto: document.querySelector('.txt-monto').innerText });
            actualizarTablaReporte();
        }
    }

    function actualizarTablaReporte() {
        tablaBody.innerHTML = "";
        [...window.redTicketsInh].reverse().forEach(t => {
            tablaBody.innerHTML += `<tr><td>${t.fecha}</td><td>#${t.ticket}</td><td>${t.hipodromo}</td><td>${t.tipo}</td><td>${t.selecciones}</td><td>${t.monto}</td><td style="color:#10b981;font-weight:bold;">VALIDADO</td></tr>`;
        });
    }

    document.getElementById('aceptar-btn').onclick = () => { overlay.style.display = 'none'; modalTicketExitoso.style.display = 'none'; };
    document.getElementById('imprimir-btn').onclick = () => { alert("Descargando PDF oficial del Ticket..."); };

    let burbujaSoporte = document.createElement('div');
    burbujaSoporte.setAttribute('style', 'position:fixed;bottom:10px;right:12px;width:44px;height:44px;background:#10b981;border-radius:50%;box-shadow:0 4px 10px rgba(16,185,129,0.4);display:flex;align-items:center;justify-content:center;z-index:2100000;cursor:pointer;');
    burbujaSoporte.innerHTML = `<span style="color:#fff;font-size:18px;">💬</span>`;
    document.body.appendChild(burbujaSoporte);

    aplicarRasgosRealesTuBoton();
    inicializarJornadaHipica();
</script>
