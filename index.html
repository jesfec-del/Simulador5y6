<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Oficial 5y6</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 8px; border: 1px solid #444; }
        h2 { text-align: center; color: #ffc200; margin-top: 0; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-weight: bold; }
        .input-group input { width: 80px; padding: 6px; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; text-align: center; }
        .panel-juego { background: #1a1a1a; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-top: 20px; }
        .fila-carrera { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; background: #222; padding: 8px; border-radius: 4px; }
        .carrera-titulo { width: 90px; font-weight: bold; font-size: 14px; color: #aaa; }
        .grupo-botones { display: flex; gap: 4px; flex-wrap: wrap; }
        .grupo-botones button { width: 32px; height: 32px; font-weight: bold; border: 1px solid #555; background: #333; color: #fff; border-radius: 4px; cursor: pointer; }
        .grupo-botones button.selected { background: #10b981; border-color: #10b981; }
        .acciones { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-limpiar { background: #ef4444; color: white; }
        .btn-sellar { background: #ffc200; color: #000; }
        .modal-simulado { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2d2d2d; border: 2px solid #555; padding: 25px; border-radius: 8px; z-index: 99999; box-shadow: 0 4px 20px rgba(0,0,0,0.8); text-align: center; min-width: 250px; }
        .modal-simulado p { margin-bottom: 20px; font-size: 16px; }
        .modal-simulado button { padding: 8px 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background: #2563eb; color: white; margin: 5px; }
        .btn-print { background: #4b5563 !important; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:99998; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Sistema 5y6</h2>
    
    <div class="input-group">
        <label>Unidades / Monto:</label>
        <input type="number" id="unidades-input" value="1" min="1">
    </div>

    <div class="panel-juego" id="zona-interactiva">
        <div class="acciones" style="margin-bottom: 15px;">
            <button class="btn-main btn-limpiar" id="limpiar-btn">Limpiar Formulario</button>
        </div>

        <div id="contenedor-filas"></div>

        <div class="acciones">
            <button class="btn-main btn-sellar" id="sellar-btn">Sellar Cuadro</button>
        </div>
    </div>
</div>

<div class="overlay" id="modal-overlay"></div>
<div class="modal-simulado" id="modal-confirmar">
    <p>¿Está seguro de procesar esta jugada?</p>
    <button id="confirmar-btn">Confirmar</button>
</div>

<div class="modal-simulado" id="modal-ticket-exitoso">
    <p style="color: #10b981; font-weight: bold;">✔ Operación Exitosa</p>
    <p id="ticket-info-text" style="font-size: 13px; font-family: monospace;"></p>
    <button class="btn-print" id="imprimir-btn">Imprimir</button>
    <button id="aceptar-btn">Aceptar</button>
</div>

<script>
    const contenedor = document.getElementById('contenedor-filas');
    for (let i = 1; i <= 6; i++) {
        let fila = document.createElement('div');
        fila.className = 'fila-carrera';
        let titulo = document.createElement('div');
        titulo.className = 'carrera-titulo';
        titulo.innerText = `Carrera ${i}:`;
        let grupo = document.createElement('div');
        grupo.className = 'grupo-botones';
        
        for (let j = 1; j <= 10; j++) {
            let btn = document.createElement('button');
            btn.type = 'button';
            btn.innerText = j;
            btn.onclick = () => btn.classList.toggle('selected');
            grupo.appendChild(btn);
        }
        fila.append(titulo, grupo);
        contenedor.appendChild(fila);
    }

    const limpiarBtn = document.getElementById('limpiar-btn');
    const sellarBtn = document.getElementById('sellar-btn');
    const overlay = document.getElementById('modal-overlay');
    const modalConfirmar = document.getElementById('modal-confirmar');
    const modalTicket = document.getElementById('modal-ticket-exitoso');
    const confirmarBtn = document.getElementById('confirmar-btn');
    const aceptarBtn = document.getElementById('aceptar-btn');
    const imprimirBtn = document.getElementById('imprimir-btn');
    const ticketInfoText = document.getElementById('ticket-info-text');

    limpiarBtn.onclick = () => {
        document.querySelectorAll('.grupo-botones button').forEach(b => b.classList.remove('selected'));
    };

    sellarBtn.onclick = () => {
        // VALIDACIÓN DEL INH REAL: Verificar que haya mínimo 1 caballo por carrera seleccionado
        let carrerasValidas = 0;
        for (let i = 0; i < 6; i++) {
            let seleccionados = contenedor.children[i].querySelectorAll('.grupo-botones button.selected').length;
            if (seleccionados > 0) { carrerasValidas++; }
        }

        // Si falta alguna carrera por marcar, el botón se bloquea silenciosamente y no abre el modal
        if (carrerasValidas < 6) {
            console.log("Simulador: Bloqueado. Debes seleccionar al menos un caballo en las 6 carreras.");
            return; 
        }

        overlay.style.display = 'block';
        modalConfirmar.style.display = 'block';
    };

    confirmarBtn.onclick = () => {
        modalConfirmar.style.display = 'none';

        if (Math.random() < 0.03) { return; }

        let jugadaActual = [];
        for (let i = 1; i <= 6; i++) {
            let seleccionados = Array.from(contenedor.children[i-1].querySelectorAll('.grupo-botones button.selected')).map(b => b.innerText);
            jugadaActual.push(`C${i+7}(${seleccionados.join(',')})`);
        }

        let numTicket = "#" + Math.floor(1000000 + Math.random() * 9000000);
        ticketInfoText.innerText = `Ticket: ${numTicket}\n${jugadaActual.join(' ').substring(0, 35)}...`;
        
        modalTicket.style.display = 'block';

        let fakeTicketData = {
            fecha: new Date().toLocaleString(),
            ticket: numTicket,
            hipodromo: "La Rinconada",
            tipo: "5 Y 6",
            selecciones: jugadaActual.join(' '),
            monto: (parseFloat(document.getElementById('unidades-input').value) * 30).toFixed(2),
            estado: "PROCESADO"
        };

        if (window.interceptorActivado && window.redTicketsInh) {
            window.redTicketsInh.push(fakeTicketData);
            setTimeout(() => {
                window.ticketDetectado = true;
                window.dispatchEvent(new CustomEvent('ticketSimuladoExitoso'));
            }, 300);
        }
    };

    imprimirBtn.onclick = () => { console.log("Simulador: Clic en Imprimir."); };

    aceptarBtn.onclick = () => {
        modalTicket.style.display = 'none';
        overlay.style.display = 'none';
        document.querySelectorAll('.grupo-botones button').forEach(b => b.classList.remove('selected'));
    };
</script>

</body>
</html>
