<script>
    let estructuraCarreras = [];
    let ticketTemporal = null;
    let loopTextosLoading = null;
    window.redTicketsInh = window.redTicketsInh || [];
    let intentosGlobales = 0;

    const contenedor = document.getElementById('contenedor-filas');
    const sellarBtn = document.getElementById('sellar-btn');
    const overlay = document.getElementById('modal-overlay');
    const modalConfirmar = document.getElementById('modal-confirmar');
    const modalConectando = document.getElementById('modal-conectando');
    const modalErrorInh = document.getElementById('modal-error-inh');
    const modalTicketExitoso = document.getElementById('modal-ticket-exitoso');
    const resumenComb = document.getElementById('resumen-combinaciones');
    const confirmarBtn = document.getElementById('confirmar-btn');
    const cancelarBtn = document.getElementById('cancelar-btn');
    const ticketInfoText = document.getElementById('ticket-info-text');
    const tablaBody = document.getElementById('tabla-body');
    const loadingTitle = document.getElementById('loading-title');
    const loadingSubtext = document.getElementById('loading-subtext');

    function inicializarJornadaHipica() {
        estructuraCarreras = [
            { carrera: 1, inscritos: 12, retirados: [3, 8] },
            { carrera: 2, inscritos: 10, retirados: [5] },
            { carrera: 3, inscritos: 14, retirados: [2, 11] },
            { carrera: 4, inscritos: 11, retirados: [6] },
            { carrera: 5, inscritos: 15, retirados: [9, 14] },
            { carrera: 6, inscritos: 13, retirados: [4] }
        ];
        renderizarTablero();
    }

    function renderizarTablero() {
        contenedor.innerHTML = '';
        estructuraCarreras.forEach(c => {
            let fila = document.createElement('div');
            fila.className = 'fila-carrera';
            let titulo = document.createElement('div');
            titulo.className = 'carrera-titulo';
            titulo.innerHTML = `Carrera ${c.carrera}:<br><span style="font-size:9px;color:#888;">(${c.inscritos} Ins / ${c.retirados.length} Ret)</span>`;
            let group = document.createElement('div');
            group.className = 'grupo-botones';
            
            for (let j = 1; j <= c.inscritos; j++) {
                let btn = document.createElement('button');
                btn.type = 'button';
                btn.innerText = j;
                btn.classList.add(`m-${j}`);
                if (c.retirados.includes(j)) {
                    btn.classList.add('retirado');
                    btn.disabled = true;
                } else {
                    btn.onclick = () => {
                        btn.classList.toggle('selected');
                        verificarLineasCompletas();
                    };
                }
                group.appendChild(btn);
            }
            fila.append(titulo, group);
            contenedor.appendChild(fila);
        });
        verificarLineasCompletas();
    }
function verificarLineasCompletas() {
        let filas = document.querySelectorAll('.fila-carrera');
        let todasTienenSeleccion = true;
        filas.forEach(f => {
            if (f.querySelectorAll('button.selected').length === 0) todasTienenSeleccion = false;
        });
        sellarBtn.disabled = !todasTienenSeleccion;
    }

    function limpiarFormularioInterno() {
        document.querySelectorAll('.grupo-botones button:not(.retirado)').forEach(b => b.classList.remove('selected'));
        verificarLineasCompletas(); 
    }

    sellarBtn.onclick = () => {
        let selecciones = [];
        document.querySelectorAll('.fila-carrera').forEach((f, idx) => {
            let s = Array.from(f.querySelectorAll('button.selected')).map(b => b.innerText);
            selecciones.push(`C${idx+1}(${s.join(',')})`);
        });
        resumenComb.innerText = selecciones.join(' ');
        confirmarBtn.innerText = "Confirmar";
        confirmarBtn.disabled = false;
        overlay.style.display = 'block';
        modalConfirmar.style.display = 'block';
    };

    cancelarBtn.onclick = () => {
        overlay.style.display = 'none';
        modalConfirmar.style.display = 'none';
    };

    confirmarBtn.onclick = () => {
        modalConfirmar.style.display = 'none';
        modalConectando.style.display = 'block';
        loadingTitle.innerText = "Procesando Apuesta...";
        loadingSubtext.innerText = "Estableciendo conexión con los servidores del INH";
        
        let paso = 0;
        loopTextosLoading = setInterval(() => {
            paso++;
            if (paso === 1) {
                loadingTitle.innerText = "Nuevo Intento...";
                loadingSubtext.innerText = "Estableciendo nueva conexión con la central...";
            } else if (paso === 2) {
                loadingTitle.innerText = "Procesando Apuesta...";
                loadingSubtext.innerText = "Reintentando el procesamiento de los bloques...";
                paso = 0;
            }
        }, 1500);
        
        let retrasoServidor = Math.floor(Math.random() * 1500) + 3200; 
        let esFalla = intentosGlobales === 0 ? true : Math.random() <= 0.20;
        intentosGlobales++;

        setTimeout(() => {
            clearInterval(loopTextosLoading); 
            modalConectando.style.display = 'none';
            if (esFalla) {
                // CORRECCIÓN PARA EL BOT: Oculta la ventana de confirmación al fallar igual que el INH real
                modalConfirmar.style.display = 'none';
                modalErrorInh.style.display = 'block';
                return; 
            }

            let numTicket = Math.floor(100000 + Math.random() * 900000);
            let monto = (document.getElementById('unidades-input').value || 1) * 100;
            let textoCombinaciones = (resumenComb.innerText || resumenComb.textContent || "").trim();
            
            let ahora = new Date();
            let fechaStr = ahora.toLocaleDateString();
            let horaStr = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).toLowerCase();

            ticketTemporal = {
                fecha: fechaStr,
                hora: horaStr,
                ticket: numTicket.toString(),
                hipodromo: "La Rinconada",
                tipo: "5 y 6",
                selecciones: textoCombinaciones,
                monto: parseFloat(monto).toFixed(2),
                estado: "PROCESADO"
            };
            
            if (window.redTicketsInh) { window.redTicketsInh.push(ticketTemporal); }
            ticketInfoText.innerText = `Ticket: # ${numTicket}\nCombinación: ${textoCombinaciones}\nMonto: ${monto} Bsf\nProcesado con éxito.`;
            modalTicketExitoso.style.display = 'block';
        }, retrasoServidor);
    };
document.getElementById('error-aceptar-btn').onclick = () => {
        modalErrorInh.style.display = 'none';
        modalConfirmar.style.display = 'block'; 
    };

    document.getElementById('aceptar-btn').onclick = () => {
        modalTicketExitoso.style.display = 'none';
        overlay.style.display = 'none';
        if (ticketTemporal) {
            let tr = document.createElement('tr');
            tr.className = "border-b border-border/50 hover:bg-muted/20 cursor-pointer transition-colors";
            
            tr.innerHTML = `
                <td class="px-6 py-4 text-foreground whitespace-nowrap">
                    <div class="text-sm font-medium">${ticketTemporal.fecha}</div>
                    <div class="text-[10px] text-muted-foreground">${ticketTemporal.hora}</div>
                </td>
                <td class="px-6 py-4">
                    <span class="text-sm font-bold text-foreground tabular-nums">#${ticketTemporal.ticket}</span>
                </td>
                <td class="px-6 py-4 text-foreground text-sm">${ticketTemporal.hipodromo}</td>
                <td class="px-6 py-4">
                    <span class="inline-flex items-center rounded-md bg-primary/10 border border-primary/20 px-2 py-0.5 text-[10px] font-bold text-primary uppercase tracking-wider">${ticketTemporal.tipo}</span>
                </td>
                <td class="px-6 py-4 text-muted-foreground text-xs font-mono max-w-[200px] truncate" title="${ticketTemporal.selecciones}">
                    ${ticketTemporal.selecciones}
                </td>
                <td class="px-6 py-4 text-foreground font-bold tabular-nums text-sm whitespace-nowrap">${ticketTemporal.monto}</td>
                <td class="px-6 py-4 text-right">
                    <span class="inline-flex items-center rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-destructive bg-destructive/10">${ticketTemporal.estado}</span>
                </td>`;
                
            tablaBody.insertBefore(tr, tablaBody.firstChild);
            ticketTemporal = null;
        }
        limpiarFormularioInterno();
    };
    
    document.getElementById('imprimir-btn').onclick = () => { alert("Simulación de descarga."); };
    window.onload = inicializarJornadaHipica;
</script>
</body>
</html>
